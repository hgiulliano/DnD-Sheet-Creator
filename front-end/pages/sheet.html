<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Sheets | Login</title>
    <link rel="stylesheet" href="../css/sheet.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
</head>
</head>

<body>
    <div class="central">
        <header class="header">
            <h1>D&D Sheets Viewer</h1>
            <p class="lead">Here's your sheet properties : </p>
        </header>

        <div class="sheet">
            <h2 id="charName"></h2>
            <table id="propsTable">
                <thead>
                    <tr>
                        <th>
                            name
                        </th>
                        <th>
                            hp
                        </th>
                        <th>
                            ac
                        </th>
                        <th>
                            specie
                        </th>
                        <th>
                            level
                        </th>
                        <th>
                            speed
                        </th>
                        <th>
                            class
                        </th>
                    </tr>
                </thead>
            </table>
        </div>

        <script src="../src/sheet.js"></script>
</body>

</html>
