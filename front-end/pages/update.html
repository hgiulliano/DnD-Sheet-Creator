<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Sheets | EDITOR </title>
    <link rel="stylesheet" href="../css/update.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">
</head>
<body>
    <div class="central">
        <header class="header">
            <h1 id="title">D&D SHEET EDITOR</h1>
            <div class="main-section">
                <p class="lead">Put the ID of the character that you want to edit.</p>
                <input type="text" placeholder="Character ID here" id="charID"></input>
                <div class="charInfo"></div>
            </div>
            <br>
            <button id="nextButton">Search</button>
            <span class="charInfosMessage"></span>
            <div id="charInfos"></div>
            <br>
            <button id="sendUpdate" class="hidden">Send Update</button>

        <script src="../src/update.js"></script>
    </div>
</body>
</html>
